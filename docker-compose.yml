version: "3.9"

services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: datasus
      POSTGRES_PASSWORD: datasus
      POSTGRES_DB: datasus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasus"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    env_file: .env
    environment:
      DB_HOST: postgres
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: